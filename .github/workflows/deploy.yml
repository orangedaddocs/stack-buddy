name: Deploy to GitHub Pages

# Build the static site on every push to `main` and deploy it to GitHub Pages
# at https://orangedaddocs.github.io/stack-buddy/. This workflow assumes Pages
# is configured with "Source: GitHub Actions" in repo Settings → Pages. If
# nothing deploys after a push to main, check that setting first.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. If a second push lands while the first is
# building, the first finishes and the second supersedes it on the next run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
